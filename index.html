<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Preload Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Default SEO (overridden per-page by react-helmet-async) -->
    <title>DocFlow – Free PDF & Image Tools Online</title>
    <meta name="description" content="Free online tools for PDF compression, merging, splitting, image conversion, background removal, OCR and more. No signup required. Process files instantly in your browser." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="DocFlow" />
    <meta property="og:title" content="DocFlow – Free PDF & Image Tools Online" />
    <meta property="og:description" content="Professional PDF and image processing tools. Free, fast, and private — files never leave your browser." />
    <meta property="og:url" content="https://docflow.pages.dev" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DocFlow – Free PDF & Image Tools Online" />
    <meta name="twitter:description" content="Professional PDF and image processing tools. Free, fast, and private." />

    <!-- Structured Data: Website -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "DocFlow",
      "url": "https://docflow.pages.dev",
      "description": "Free online document and image processing toolkit",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://docflow.pages.dev/tools?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
